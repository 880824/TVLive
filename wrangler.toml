# Cloudflare Pages 本地开发配置（仅本地用，生产部署在 Dashboard 设置绑定即可）
name = "tvlive"
pages_build_output_dir = "public"
compatibility_date = "2024-09-23"

# 管理密码（生产建议在 Cloudflare Dashboard → 设置 → 环境变量 中配置，不要提交明文）
[vars]
PASSWORD = "change_me"

# KV 命名空间绑定（本地开发需填入 Dashboard 创建的 TVLIVE 命名空间 ID）
# 生产环境在 Dashboard → 设置 → 函数 → KV 命名空间绑定 中配置，变量名必须为 TVLIVE
[[kv_namespaces]]
binding = "TVLIVE"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
